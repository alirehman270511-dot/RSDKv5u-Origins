name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject Game Optimization Flags
        run: |
          cd dependencies/android
          echo "android.arguments=-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=off -DRETRO_MOD_LOADER=on" >> gradle.properties

      - name: Build Release APK
        run: |
          cd dependencies/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-origins-android-apk
          path: dependencies/android/app/build/outputs/apk/release/*.apk
