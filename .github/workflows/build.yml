name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 🟢 FIXED: Forcing the runner to fetch the correct submodule tracking heads
      - name: Checkout Code Recursively
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v4

      # 🟢 FIXED: Automatically downloads the required media files that are missing on a fresh fork
      - name: Download and Unzip Libtheora Dependency
        run: |
          cd dependencies/android
          curl -L http://xiph.org -o libtheora.tar.gz
          tar -xzf libtheora.tar.gz
          mv libtheora-1.1.1 libtheora
          rm libtheora.tar.gz

      - name: Inject Game Optimization Flags
        run: |
          cd dependencies/android
          echo "android.arguments=-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=off -DRETRO_MOD_LOADER=on" >> gradle.properties

      - name: Build Release APK
        run: |
          cd dependencies/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-origins-android-apk
          path: dependencies/android/app/build/outputs/apk/release/*.apk
